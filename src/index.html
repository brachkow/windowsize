<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Window size?</title>
    <link rel="stylesheet" href="./style.scss" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>
  <body>
    <article>
      <div>
        Device screen: <span id="screen-width"></span>×<span
          id="screen-height"
        ></span>
      </div>
      <div>
        Window: <span id="window-width"></span>×<span id="window-height"></span>
      </div>
      <div>
        Inner window: <span id="inner-width"></span>×<span
          id="inner-height"
        ></span>
      </div>
    </article>
    <script src="./script.js"></script>
  </body>
</html>
